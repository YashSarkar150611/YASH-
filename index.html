<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YASH - 3D Watch Customizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        /* Canvas */
        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            background: #f5f5f5;
            border-radius: 15px;
            position: relative;
        }

        canvas {
            max-width: 100%;
            border-radius: 10px;
            cursor: grab;
            display: block;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }

        .control-group h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 1em;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .color-btn {
            width: 100%;
            padding: 12px;
            border: 3px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            font-size: 0.8em;
        }

        .color-btn:hover {
            transform: scale(1.05);
        }

        .color-btn.active {
            border-color: #333;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        /* Presets */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .preset-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            color: #333;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .preset-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        /* Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .action-btn.reset {
            background: #999;
        }

        .action-btn.reset:hover {
            background: #777;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #1565c0;
        }

        .success-message {
            background: #c8e6c9;
            border-left: 4px solid #4caf50;
            padding: 10px;
            border-radius: 5px;
            color: #2e7d32;
            text-align: center;
            display: none;
            margin-bottom: 10px;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 YASH 3D Watch Customizer</h1>

        <div class="content">
            <!-- 3D Canvas -->
            <div class="canvas-container">
                <canvas id="watchCanvas"></canvas>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="success-message" id="successMsg">✓ Downloaded!</div>

                <!-- Dial Color -->
                <div class="control-group">
                    <h3>📋 Dial Color</h3>
                    <div class="color-grid" id="dialColors"></div>
                </div>

                <!-- Frame Color -->
                <div class="control-group">
                    <h3>🔰 Frame Color</h3>
                    <div class="color-grid" id="frameColors"></div>
                </div>

                <!-- Strap Color -->
                <div class="control-group">
                    <h3>⌚ Strap Color</h3>
                    <div class="color-grid" id="strapColors"></div>
                </div>

                <!-- Presets -->
                <div class="control-group">
                    <h3>⚡ Quick Presets</h3>
                    <div class="preset-grid">
                        <button class="preset-btn" onclick="applyPreset('classic')">Classic</button>
                        <button class="preset-btn" onclick="applyPreset('sport')">Sport</button>
                        <button class="preset-btn" onclick="applyPreset('luxury')">Luxury</button>
                        <button class="preset-btn" onclick="applyPreset('neon')">Neon</button>
                    </div>
                </div>

                <!-- Actions -->
                <div class="action-buttons">
                    <button class="action-btn" onclick="downloadWatch()">⬇️ Download</button>
                    <button class="action-btn reset" onclick="resetWatch()">↻ Reset</button>
                </div>

                <!-- Info -->
                <div class="info-box">
                    ℹ️ Drag to rotate the watch. Click colors to customize!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Watch State
        let watchState = {
            dialColor: '#000000',
            frameColor: '#c0c0c0',
            strapColor: '#1a1a1a'
        };

        let rotationX = 0.3;
        let rotationY = 0.2;
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;

        // Color Palettes
        const colors = {
            dial: [
                { name: 'Black', hex: '#000000' },
                { name: 'White', hex: '#ffffff' },
                { name: 'Navy', hex: '#000080' },
                { name: 'Blue', hex: '#0066ff' },
                { name: 'Red', hex: '#ff0000' },
                { name: 'Charcoal', hex: '#36454f' }
            ],
            frame: [
                { name: 'Silver', hex: '#c0c0c0' },
                { name: 'Gold', hex: '#ffd700' },
                { name: 'Black', hex: '#000000' },
                { name: 'Rose Gold', hex: '#b76e79' },
                { name: 'Platinum', hex: '#e5e4e2' },
                { name: 'Bronze', hex: '#cd7f32' }
            ],
            strap: [
                { name: 'Black', hex: '#1a1a1a' },
                { name: 'Dark Blue', hex: '#003d99' },
                { name: 'Brown', hex: '#654321' },
                { name: 'Red', hex: '#8b0000' },
                { name: 'Gray', hex: '#808080' },
                { name: 'Navy', hex: '#000080' }
            ]
        };

        // Presets
        const presets = {
            classic: { dialColor: '#000000', frameColor: '#c0c0c0', strapColor: '#1a1a1a' },
            sport: { dialColor: '#0066ff', frameColor: '#333333', strapColor: '#000000' },
            luxury: { dialColor: '#ffffff', frameColor: '#ffd700', strapColor: '#8b0000' },
            neon: { dialColor: '#00ff00', frameColor: '#00ffff', strapColor: '#ff00ff' }
        };

        const canvas = document.getElementById('watchCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.min(350, container.clientWidth - 20);
            canvas.height = 400;
        }

        // Draw 3D Watch
        function draw3DWatch() {
            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.save();
            ctx.translate(centerX, centerY);

            // Apply rotation
            ctx.rotate(rotationY);

            // Draw left strap
            drawStrap(ctx, -90, -80, 35, 160);

            // Draw right strap
            drawStrap(ctx, 55, -80, 35, 160);

            // Draw watch case
            ctx.fillStyle = watchState.frameColor;
            ctx.beginPath();
            ctx.arc(0, 0, 90, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw watch dial
            ctx.fillStyle = watchState.dialColor;
            ctx.beginPath();
            ctx.arc(0, 0, 80, 0, Math.PI * 2);
            ctx.fill();

            // Draw hour markers
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
                const x = Math.cos(angle) * 65;
                const y = Math.sin(angle) * 65;
                ctx.fillStyle = '#fff';
                ctx.fillRect(x - 2, y - 8, 4, 16);
            }

            // Draw clock hands
            const now = new Date();
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // Hour hand
            const hourAngle = ((hours + minutes / 60) / 12) * Math.PI * 2 - Math.PI / 2;
            ctx.strokeStyle = isLight(watchState.dialColor) ? '#000' : '#fff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(hourAngle) * 35, Math.sin(hourAngle) * 35);
            ctx.stroke();

            // Minute hand
            const minuteAngle = (minutes / 60) * Math.PI * 2 - Math.PI / 2;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(minuteAngle) * 50, Math.sin(minuteAngle) * 50);
            ctx.stroke();

            // Second hand
            const secondAngle = (seconds / 60) * Math.PI * 2 - Math.PI / 2;
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(secondAngle) * 60, Math.sin(secondAngle) * 60);
            ctx.stroke();

            // Center dot
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, Math.PI * 2);
            ctx.fill();

            // Draw time text
            const textColor = isLight(watchState.dialColor) ? '#000000' : '#ffffff';
            ctx.fillStyle = textColor;
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            const timeStr = now.toLocaleTimeString().substring(0, 5);
            ctx.fillText(timeStr, 0, 15);

            ctx.restore();
        }

        // Draw strap
        function drawStrap(ctx, x, y, width, height) {
            ctx.fillStyle = watchState.strapColor;
            ctx.beginPath();
            ctx.roundRect(x, y, width, height, 15);
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // Check if color is light
        function isLight(hex) {
            const r = parseInt(hex.substr(1, 2), 16);
            const g = parseInt(hex.substr(3, 2), 16);
            const b = parseInt(hex.substr(5, 2), 16);
            return (r * 299 + g * 587 + b * 114) / 1000 > 128;
        }

        // Initialize Color Pickers
        function initializeColorPickers() {
            const dialContainer = document.getElementById('dialColors');
            colors.dial.forEach(color => {
                const btn = createColorButton(color, 'dial');
                dialContainer.appendChild(btn);
            });

            const frameContainer = document.getElementById('frameColors');
            colors.frame.forEach(color => {
                const btn = createColorButton(color, 'frame');
                frameContainer.appendChild(btn);
            });

            const strapContainer = document.getElementById('strapColors');
            colors.strap.forEach(color => {
                const btn = createColorButton(color, 'strap');
                strapContainer.appendChild(btn);
            });
        }

        // Create Color Button
        function createColorButton(color, type) {
            const btn = document.createElement('button');
            btn.className = 'color-btn';
            btn.style.backgroundColor = color.hex;
            btn.textContent = color.name;
            btn.onclick = () => selectColor(color.hex, type);
            return btn;
        }

        // Select Color
        function selectColor(hex, type) {
            watchState[type + 'Color'] = hex;
            updateActiveButtons();
        }

        // Update Active Buttons
        function updateActiveButtons() {
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.style.backgroundColor === watchState.dialColor ||
                    btn.style.backgroundColor === watchState.frameColor ||
                    btn.style.backgroundColor === watchState.strapColor) {
                    btn.classList.add('active');
                }
            });
        }

        // Apply Preset
        function applyPreset(name) {
            watchState = { ...presets[name] };
            updateActiveButtons();
        }

        // Download Watch
        function downloadWatch() {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `yash-3d-watch-${Date.now()}.png`;
            link.click();

            const msg = document.getElementById('successMsg');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);
        }

        // Reset Watch
        function resetWatch() {
            watchState = { ...presets.classic };
            rotationX = 0.3;
            rotationY = 0.2;
            updateActiveButtons();
        }

        // Mouse Controls
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - lastX;
            const deltaY = e.clientY - lastY;
            rotationY += deltaX * 0.01;
            rotationX += deltaY * 0.01;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Touch Controls
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - lastX;
            const deltaY = e.touches[0].clientY - lastY;
            rotationY += deltaX * 0.01;
            rotationX += deltaY * 0.01;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Animation Loop
        function animate() {
            draw3DWatch();
            requestAnimationFrame(animate);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            resizeCanvas();
            initializeColorPickers();
            updateActiveButtons();
            animate();
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
