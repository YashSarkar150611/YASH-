<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YASH - Watch Customizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        /* Watch Display */
        .watch-display {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .watch {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 8px solid;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        .watch-hand {
            position: absolute;
            background: white;
            transform-origin: bottom center;
            left: 50%;
        }

        .hour-hand {
            width: 4px;
            height: 50px;
            margin-left: -2px;
            top: 50px;
        }

        .minute-hand {
            width: 3px;
            height: 70px;
            margin-left: -1.5px;
            top: 30px;
        }

        .second-hand {
            width: 2px;
            height: 80px;
            margin-left: -1px;
            top: 20px;
            background: #ff6b6b;
        }

        .center-dot {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }

        .control-group h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 1em;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .color-btn {
            width: 100%;
            padding: 15px;
            border: 3px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            font-size: 0.9em;
        }

        .color-btn:hover {
            transform: scale(1.05);
        }

        .color-btn.active {
            border-color: #333;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        /* Presets */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .preset-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            color: #333;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .preset-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        /* Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .action-btn.reset {
            background: #999;
        }

        .action-btn.reset:hover {
            background: #777;
        }

        /* Info Box */
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #1565c0;
        }

        .success-message {
            background: #c8e6c9;
            border-left: 4px solid #4caf50;
            padding: 10px;
            border-radius: 5px;
            color: #2e7d32;
            text-align: center;
            display: none;
            margin-bottom: 10px;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 YASH Watch Customizer</h1>

        <div class="content">
            <!-- Watch Display -->
            <div class="watch-display">
                <div class="watch" id="watchDisplay">
                    <div class="watch-hand hour-hand" id="hourHand"></div>
                    <div class="watch-hand minute-hand" id="minuteHand"></div>
                    <div class="watch-hand second-hand" id="secondHand"></div>
                    <div class="center-dot"></div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="success-message" id="successMsg">✓ Downloaded!</div>

                <!-- Dial Color -->
                <div class="control-group">
                    <h3>📋 Dial Color</h3>
                    <div class="color-grid" id="dialColors"></div>
                </div>

                <!-- Frame Color -->
                <div class="control-group">
                    <h3>🔰 Frame Color</h3>
                    <div class="color-grid" id="frameColors"></div>
                </div>

                <!-- Strap Color -->
                <div class="control-group">
                    <h3>⌚ Strap Color</h3>
                    <div class="color-grid" id="strapColors"></div>
                </div>

                <!-- Presets -->
                <div class="control-group">
                    <h3>⚡ Quick Presets</h3>
                    <div class="preset-grid">
                        <button class="preset-btn" onclick="applyPreset('classic')">Classic</button>
                        <button class="preset-btn" onclick="applyPreset('sport')">Sport</button>
                        <button class="preset-btn" onclick="applyPreset('luxury')">Luxury</button>
                        <button class="preset-btn" onclick="applyPreset('neon')">Neon</button>
                    </div>
                </div>

                <!-- Actions -->
                <div class="action-buttons">
                    <button class="action-btn" onclick="downloadWatch()">⬇️ Download</button>
                    <button class="action-btn reset" onclick="resetWatch()">↻ Reset</button>
                </div>

                <!-- Info -->
                <div class="info-box">
                    ℹ️ Click colors to customize your watch. Use presets for quick designs!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Watch State
        let watchState = {
            dialColor: '#000000',
            frameColor: '#c0c0c0',
            strapColor: '#1a1a1a'
        };

        // Color Palettes
        const colors = {
            dial: [
                { name: 'Black', hex: '#000000' },
                { name: 'White', hex: '#ffffff' },
                { name: 'Navy', hex: '#000080' },
                { name: 'Blue', hex: '#0066ff' },
                { name: 'Red', hex: '#ff0000' },
                { name: 'Charcoal', hex: '#36454f' }
            ],
            frame: [
                { name: 'Silver', hex: '#c0c0c0' },
                { name: 'Gold', hex: '#ffd700' },
                { name: 'Black', hex: '#000000' },
                { name: 'Rose Gold', hex: '#b76e79' },
                { name: 'Platinum', hex: '#e5e4e2' },
                { name: 'Bronze', hex: '#cd7f32' }
            ],
            strap: [
                { name: 'Black', hex: '#1a1a1a' },
                { name: 'Dark Blue', hex: '#003d99' },
                { name: 'Brown', hex: '#654321' },
                { name: 'Red', hex: '#8b0000' },
                { name: 'Gray', hex: '#808080' },
                { name: 'Navy', hex: '#000080' }
            ]
        };

        // Presets
        const presets = {
            classic: { dialColor: '#000000', frameColor: '#c0c0c0', strapColor: '#1a1a1a' },
            sport: { dialColor: '#0066ff', frameColor: '#333333', strapColor: '#000000' },
            luxury: { dialColor: '#ffffff', frameColor: '#ffd700', strapColor: '#8b0000' },
            neon: { dialColor: '#00ff00', frameColor: '#00ffff', strapColor: '#ff00ff' }
        };

        // Initialize Color Pickers
        function initializeColorPickers() {
            // Dial
            const dialContainer = document.getElementById('dialColors');
            colors.dial.forEach(color => {
                const btn = createColorButton(color, 'dial');
                dialContainer.appendChild(btn);
            });

            // Frame
            const frameContainer = document.getElementById('frameColors');
            colors.frame.forEach(color => {
                const btn = createColorButton(color, 'frame');
                frameContainer.appendChild(btn);
            });

            // Strap
            const strapContainer = document.getElementById('strapColors');
            colors.strap.forEach(color => {
                const btn = createColorButton(color, 'strap');
                strapContainer.appendChild(btn);
            });
        }

        // Create Color Button
        function createColorButton(color, type) {
            const btn = document.createElement('button');
            btn.className = 'color-btn';
            btn.style.backgroundColor = color.hex;
            btn.textContent = color.name;
            btn.onclick = () => selectColor(color.hex, type);
            return btn;
        }

        // Select Color
        function selectColor(hex, type) {
            watchState[type + 'Color'] = hex;
            updateWatch();
            updateActiveButtons();
        }

        // Update Watch Display
        function updateWatch() {
            const watch = document.getElementById('watchDisplay');
            watch.style.backgroundColor = watchState.dialColor;
            watch.style.borderColor = watchState.frameColor;
            
            // Update hand colors based on dial color
            const hands = document.querySelectorAll('.watch-hand');
            const isLightDial = isLight(watchState.dialColor);
            hands.forEach(hand => {
                if (hand.id !== 'secondHand') {
                    hand.style.backgroundColor = isLightDial ? '#000000' : '#ffffff';
                }
            });
        }

        // Check if color is light
        function isLight(hex) {
            const r = parseInt(hex.substr(1, 2), 16);
            const g = parseInt(hex.substr(3, 2), 16);
            const b = parseInt(hex.substr(5, 2), 16);
            return (r * 299 + g * 587 + b * 114) / 1000 > 128;
        }

        // Update Active Buttons
        function updateActiveButtons() {
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.style.backgroundColor === watchState.dialColor ||
                    btn.style.backgroundColor === watchState.frameColor ||
                    btn.style.backgroundColor === watchState.strapColor) {
                    btn.classList.add('active');
                }
            });
        }

        // Update Clock Hands
        function updateClockHands() {
            const now = new Date();
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const hourHand = document.getElementById('hourHand');
            const minuteHand = document.getElementById('minuteHand');
            const secondHand = document.getElementById('secondHand');

            const hourDegrees = (hours + minutes / 60) * 30;
            const minuteDegrees = (minutes + seconds / 60) * 6;
            const secondDegrees = seconds * 6;

            hourHand.style.transform = `rotate(${hourDegrees}deg)`;
            minuteHand.style.transform = `rotate(${minuteDegrees}deg)`;
            secondHand.style.transform = `rotate(${secondDegrees}deg)`;
        }

        // Apply Preset
        function applyPreset(name) {
            watchState = { ...presets[name] };
            updateWatch();
            updateActiveButtons();
        }

        // Download Watch
        function downloadWatch() {
            const watch = document.getElementById('watchDisplay');
            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 200;
            const ctx = canvas.getContext('2d');

            // Draw background
            ctx.fillStyle = watchState.dialColor;
            ctx.beginPath();
            ctx.arc(100, 100, 100, 0, Math.PI * 2);
            ctx.fill();

            // Draw border
            ctx.strokeStyle = watchState.frameColor;
            ctx.lineWidth = 8;
            ctx.stroke();

            // Draw time
            ctx.fillStyle = isLight(watchState.dialColor) ? '#000000' : '#ffffff';
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            ctx.fillText(timeStr.substring(0, 5), 100, 100);

            // Download
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `yash-watch-${Date.now()}.png`;
            link.click();

            // Show success message
            const msg = document.getElementById('successMsg');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);
        }

        // Reset Watch
        function resetWatch() {
            watchState = { ...presets.classic };
            updateWatch();
            updateActiveButtons();
        }

        // Animation Loop
        function animate() {
            updateClockHands();
            requestAnimationFrame(animate);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            initializeColorPickers();
            updateWatch();
            updateActiveButtons();
            animate();
        });
    </script>
</body>
</html>
